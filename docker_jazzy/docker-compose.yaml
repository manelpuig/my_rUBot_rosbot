services:
  rosbot_jazzy:
    image: manelpuig/ros2-jazzy-ub-rosbot:latest
    container_name: rosbot_jazzy
    network_mode: host
    ipc: host
    privileged: true
    stdin_open: true
    tty: true

    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID=5 # ⚠️ numero del grup/robot (1,2,3,4)
      
      # --- Robust pair-only networking ---
      #- ROS_AUTOMATIC_DISCOVERY_RANGE=OFF # only on real rosbot
      #- ROS_STATIC_PEERS=192.168.1.54   # ⚠️ IP del robot (14,24,34,44)

      # CycloneDDS XML (PC side)
      #- CYCLONEDDS_URI=file:///config/cyclonedds_pc.xml # only on real rosbot

      # X11 / rendering
      #- DISPLAY=${DISPLAY} #Ubuntu
      - DISPLAY=host.docker.internal:0.0 #Windows+xlaunch
      - QT_X11_NO_MITSHM=1
      #- LIBGL_ALWAYS_SOFTWARE=1
      #- MESA_GL_VERSION_OVERRIDE=2.1

    volumes:
      # Entry point script
      - ./entrypoint_pc.sh:/entrypoint_pc.sh:ro
      # X11 display for RViz/Gazebo
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # GPU / rendering devices (if needed)
      - /dev:/dev
      - /dev/dri:/dev/dri
      # CycloneDDS configuration (PC side)
      - ./cyclonedds_pc.xml:/config/cyclonedds_pc.xml:ro

    entrypoint: /entrypoint_pc.sh
    command: sleep infinity
